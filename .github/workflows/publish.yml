name: Publish to GitHub Packages

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Set snapshot version for branch builds
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          BASE_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout | sed 's/-SNAPSHOT//')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          mvn --no-transfer-progress versions:set -DnewVersion="${BASE_VERSION}-${SHORT_SHA}-SNAPSHOT" -DgenerateBackupPoms=false

      - name: Set release version from tag
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          mvn --no-transfer-progress versions:set -DnewVersion="${TAG_VERSION}" -DgenerateBackupPoms=false

      - name: Build with Maven
        run: mvn --no-transfer-progress --batch-mode clean verify

      - name: Publish to GitHub Packages
        run: mvn --no-transfer-progress --batch-mode deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
