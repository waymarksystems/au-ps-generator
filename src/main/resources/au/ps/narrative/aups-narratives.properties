################################################
# AU Patient Summary (AU PS) narrative templates
#
# These entries define the narrative used for each section of the generated
# AU PS document. Templates live under classpath:au/ps/narrative/ and fall back
# to the HAPI FHIR IPS utility fragments for shared rendering helpers.
#
# To customise a section's narrative without breaking AU PS conformance,
# override the relevant ".narrative" entry to point at your own classpath
# template, for example:
#
#   aups-allergyintolerance.narrative=classpath:my/custom/allergyintolerance.html
#
# Sections are matched by "resourceType" and "profile" (the Composition
# section definition canonical), so the prefix (aups-*) is only a label.
################################################

aups-allergyintolerance.resourceType=Bundle
aups-allergyintolerance.profile=https://hl7.org/fhir/uv/ips/StructureDefinition-Composition-uv-ips-definitions.html#Composition.section:sectionAllergies
aups-allergyintolerance.narrative=classpath:au/ps/narrative/allergyintolerance.html

